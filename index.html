
<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./bus.png" type="image/png">
  <title>Formatar Mensagem com Motoristas</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #fafafa; }
    textarea, input { width: 100%; font-size: 14px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
    button { padding: 8px 12px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; font-size: 14px; }
    button:hover { background-color: #0056b3; }
    .linha { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 10px 15px; margin-bottom: 8px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .texto { flex: 1; margin-right: 10px; white-space: pre-wrap; }
    #saida { margin-top: 20px; }
    h2, h3 { color: #333; }
  </style>
</head>
<body>

<h2>Formatar Mensagem de Ônibus 🚌</h2>

<label><strong>Mensagem original:</strong></label>
<textarea id="mensagemInput" placeholder="Cole a mensagem com os ônibus aqui..."></textarea>

<label><strong>Motoristas:</strong></label>
<input id="motoristasInput" placeholder="Ex: 500 Anderson,600 Wellington,1000 Reis,1100 Claudiomiro,1150 Valter,1200 Lucio,1300 Cássio,700 Andreia">

<button onclick="formatarMensagem()">Formatar</button>

<h3>Mensagens individuais:</h3>
<div id="saida"></div>

<h3>Resumo geral:</h3>
<div style="margin-top: 10px;">
  <textarea id="resumoGeral" rows="14" readonly></textarea>
  <button onclick="copiarResumo()">Copiar resumo</button>
</div>

<script>
  function formatarMensagem() {
    const mensagem = document.getElementById('mensagemInput').value
    const piloto = document.getElementById('motoristasInput').value
    let cont = 0;
    let texto = mensagem.split("\n")
    let escala = piloto.split(",")
    let motoristas = {}
    let temp = {}
    let veiculos = ["400","500","600","700","800","1000","1050","1100","1150","1200","1300"]
    let msgFinal = ""
    const saida = document.getElementById('saida');
    const resumoGeral = document.getElementById('resumoGeral');
    saida.innerHTML = '';
    resumoGeral.value = '';

    console.log(veiculos);
    console.log(escala);
    
    // SEPARANDO OS MOTORISTAS
    
    for (let i = 0; i < escala.length; i++) {
      for (let j = 0; j < veiculos.length; j++) {
        if (escala[i].includes(veiculos[j])) {
          escala[i] = escala[i].replaceAll(veiculos[j]+" ","")
        }        
      }
    }

    console.log(escala);    

    // FORMATAÇÃO DE TEXTO

    for (let i = 0; i < texto.length; i++) {
      texto[i] = texto[i].replaceAll("Bus","*BUS")
      texto[i] = texto[i].replaceAll("BUS","*BUS")
      texto[i] = texto[i].replaceAll("Micro","*MICRO")
      texto[i] = texto[i].replaceAll("MICRO","*MICRO")   
      texto[i] = texto[i].replaceAll("com","- GUIA") 
      texto[i] = texto[i].replaceAll("COM","- GUIA") 
      if(texto[i].includes("para out")){
        texto[i] = texto[i].replaceAll("para out","para Transfer OUT")        
      }
      if(texto[i].includes("para in")){
        texto[i] = texto[i].replaceAll("para in","para Transfer IN")        
      }
      else if(texto[i].includes("pra in")){
        texto[i] = texto[i].replaceAll("pra in","para Transfer IN")     
      }
      if(texto[i].includes("+ in")){
        texto[i] = texto[i].replaceAll("+ in","+ IN")        
      }
      if(texto[i].includes(" as ")){
        texto[i] = texto[i].replaceAll(" as "," às ")        
      }
      if(texto[i].includes("brocker")){
        texto[i] = texto[i].replaceAll("brocker","Brocker")        
      }
      // if(texto[i].includes("para trem e vinho")){
      //   texto[i] = texto[i].replaceAll("para trem e vinho","para Tour Trem e Vinho")        
      // }

      // ADICIONANDO OS MOTORISTAS NO MEIO DA STRING E FORMATANDO COMO ELES DEVEM APARECER
      for (let j = 0; j < veiculos.length; j++) {
        if(texto[i].includes(veiculos[j]) && !texto[i].includes("para trem e vinho")){
          texto[i] = texto[i].replaceAll(veiculos[j],veiculos[j]+"* - "+escala[i]+" - Estar")        
        }
        else if(texto[i].includes(veiculos[j]) && texto[i].includes("para trem e vinho")){
          texto[i] = texto[i].replaceAll("para trem e vinho","para Tour Trem e Vinho")
          texto[i] = texto[i].replaceAll(veiculos[j],veiculos[j]+"* - "+escala[i]+" -")  
        }
      }
    }

    // PEGANDO A DATA DO DIA SEGUINTE DIA/MES E O DIA DA SEMANA

    const hoje = new Date();
    const amanha = new Date();
    amanha.setDate(hoje.getDate() + 1);
    const dia = String(amanha.getDate()).padStart(2, '0');
    const mes = String(amanha.getMonth() + 1).padStart(2, '0');
    const diasSemana = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
    const diaSemana = diasSemana[amanha.getDay()];

    console.log(texto);

    // FORMATANDO TEXTOS INDIVIDUAIS E EXIBINDO NA TELA

    for (let i = 0; i < texto.length; i++) {

      let div = document.createElement('div');
      div.className = 'linha';
      const saudacao = `Boa tarde ${escala[i]}! Tudo bem?!\n*Segue demandas de amanhã ${dia}/${mes}, ${diaSemana}:*`;

      let textoFinalComSaudacao = `${saudacao}\n${texto[i]}`;

      if (textoFinalComSaudacao.includes("*BUS")) {
        textoFinalComSaudacao = textoFinalComSaudacao.replaceAll("*BUS"," 🚎 *BUS")         
      }
      else if(textoFinalComSaudacao.includes("*MICRO")){
        textoFinalComSaudacao = textoFinalComSaudacao.replaceAll("*MICRO"," 🚐 *MICRO")         
      }

      const textoEl = document.createElement('div');
      textoEl.className = 'texto';
      textoEl.textContent = textoFinalComSaudacao;

      const botao = document.createElement('button');
      botao.textContent = 'Copiar';
      botao.onclick = () => copiarTexto(textoFinalComSaudacao, botao);

      div.appendChild(textoEl);
      div.appendChild(botao);
      saida.appendChild(div);
    }



    // ARMAZENANDO TOTA INFORMAÇÃO EM UMA VARIAVEL PARA EXIBIR NA TELA
    msgFinal += `Boa tarde! Tudo bem?!\n*Segue demandas de amanhã ${dia}/${mes}, ${diaSemana}:\n\n*`;
    for (let i = 0; i < texto.length; i++) {
      msgFinal += texto[i]+"\n\n"
    }

    //  EXIBINDO A TODA INFORMAÇÃO NA TELA EM UMA UNICA MENSAGEM
    const resumo = document.getElementById('resumoGeral').value = msgFinal
  }


  function copiarResumo(){
    const resumo = document.getElementById('resumoGeral').value
    navigator.clipboard.writeText(resumo).then(() => {
      console.log('Content copied to clipboard');
      /* Resolved - text copied to clipboard successfully */
    },() => {
      console.error('Failed to copy');
      /* Rejected - text failed to copy to the clipboard */
    });
  }

  async function copiarTexto(texto, botao) {
  try {
      await navigator.clipboard.writeText(texto);
      const original = botao.textContent;
      botao.textContent = 'Copiado!';
      botao.style.backgroundColor = '#28a745';
      setTimeout(() => {
        botao.textContent = original;
        botao.style.backgroundColor = '#007bff';
      }, 1500);
    } catch (err) {
      alert('Erro ao copiar: ' + err);
    }
  }
</script>

</body>
</html>
